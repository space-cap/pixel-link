<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글쓰기 - Pixel-Link</title>
    <link rel="stylesheet" th:href="@{/css/global.css(v=2)}">
    <style>
        .board-container {
            width: 100%;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .form-card {
            background: var(--bg-card);
            border: 1px solid var(--card-border);
            box-shadow: var(--card-shadow);
            border-radius: var(--radius-lg);
            padding: 40px;
        }
        .form-header {
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 20px;
            margin-bottom: 32px;
        }
        .form-header h2 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .form-header p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        .form-label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition-fast);
            background: var(--bg-main);
        }
        .form-control:focus {
            border-color: var(--accent-primary);
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.1);
        }
        textarea.form-control {
            height: 250px;
            resize: none;
            font-family: inherit;
            line-height: 1.6;
        }
        
        /* 체크박스 */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-control {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        /* 비회원 정보 입력 구역 */
        .guest-info-section {
            background: var(--bg-main);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .guest-info-section {
                grid-template-columns: 1fr;
            }
        }
        .guest-info-title {
            grid-column: 1 / -1;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 10px;
            margin-bottom: 4px;
        }
        
        /* 파일 입력 구역 */
        .file-upload-box {
            border: 2px dashed var(--card-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            text-align: center;
            background: var(--bg-main);
            cursor: pointer;
            transition: var(--transition-fast);
        }
        .file-upload-box:hover {
            border-color: var(--accent-primary);
            background: #ffffff;
        }
        .file-upload-icon {
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .file-upload-text {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .file-list {
            margin-top: 12px;
            text-align: left;
            font-size: 0.85rem;
            color: var(--text-main);
        }
        
        /* 버튼 구역 */
        .buttons-group {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 32px;
            border-top: 1px solid var(--card-border);
            padding-top: 24px;
        }
        .btn-submit {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition-normal);
            box-shadow: 0 4px 6px -1px rgba(29, 78, 216, 0.15);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 12px -2px rgba(29, 78, 216, 0.25);
        }
        .btn-cancel {
            background: var(--bg-main);
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            padding: 12px 28px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.95rem;
        }
        .btn-cancel:hover {
            background: var(--card-border);
            color: var(--text-main);
        }
        
        /* 레이아웃 구조 */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }
        .dashboard-main {
            background: var(--bg-main);
            padding: 40px;
        }
    </style>
</head>
<body>

    <!-- [1] 로그인 회원 전용 레이아웃 -->
    <th:block th:if="${sessionUser != null}">
        <div th:replace="~{fragments :: dashboardHeader(currentUser=${sessionUser}, currentUserId=${sessionUser.id})}"></div>
        <div class="dashboard-container">
            <aside th:replace="~{fragments :: sidebar(activeMenu=${boardType == 'NOTICE' ? 'notice' : (boardType == 'FREE' ? 'free' : (boardType == 'QNA' ? 'qna' : 'partnership'))}, currentUserId=${sessionUser.id}, currentUser=${sessionUser})}"></aside>
            <div class="content-area">
                <div class="card" style="width: 100%;">
                    <div class="form-header">
                        <h2>글쓰기</h2>
                        <p>내용과 첨부파일을 기재하여 등록할 수 있습니다.</p>
                    </div>

                    <form id="articleForm" enctype="multipart/form-data">
                        <input type="hidden" name="boardType" th:value="${boardType}">

                        <div class="form-group">
                            <label class="form-label">제목</label>
                            <input type="text" name="title" class="form-control" placeholder="제목을 입력하세요" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">내용</label>
                            <textarea name="content" class="form-control" placeholder="내용을 입력하세요" required></textarea>
                        </div>

                        <!-- 비밀글 옵션 (NOTICE가 아닐 때 제공) -->
                        <div class="form-group checkbox-group" th:if="${boardType != 'NOTICE'}">
                            <input type="checkbox" id="isSecret" name="isSecret" class="checkbox-control" value="true">
                            <label for="isSecret" class="form-label" style="margin-bottom: 0; cursor: pointer;">비밀글로 설정</label>
                        </div>

                        <!-- 첨부파일 업로드 -->
                        <div class="form-group">
                            <label class="form-label">첨부파일</label>
                            <div class="file-upload-box" onclick="document.getElementById('fileInput').click()">
                                <div class="file-upload-icon">
                                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                </div>
                                <span class="file-upload-text">마우스 클릭 또는 파일을 드래그하여 업로드하세요. (다중 선택 가능)</span>
                                <input type="file" id="fileInput" name="files" style="display: none;" multiple onchange="updateFileList(this)">
                                <div id="selectedFileList" class="file-list"></div>
                            </div>
                        </div>

                        <div class="buttons-group">
                            <a th:href="@{/board/list(boardType=${boardType})}" class="btn-cancel">취소</a>
                            <button type="button" class="btn-submit" onclick="submitForm()">등록</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </th:block>

    <!-- [2] 비회원 전용 레이아웃 -->
    <th:block th:if="${sessionUser == null}">
        <div th:replace="~{fragments :: landingHeader}"></div>
        <div class="board-container">
            <div class="form-card">
                <div class="form-header">
                    <h2>글쓰기 (비회원)</h2>
                    <p>비회원은 작성자 이름과 비밀번호를 입력하셔야 합니다. 비밀번호는 암호화되어 안전하게 관리되며, 수정/삭제 및 비밀글 열람 시 필요합니다.</p>
                </div>

                <form id="articleForm" enctype="multipart/form-data">
                    <input type="hidden" name="boardType" th:value="${boardType}">

                    <!-- 비회원용 작성 정보 -->
                    <div class="guest-info-section">
                        <div class="guest-info-title">작성자 정보</div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label class="form-label">작성자 닉네임/이름</label>
                            <input type="text" name="authorName" class="form-control" placeholder="이름을 입력하세요" required style="background: white;">
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label class="form-label">비밀번호 (4자리 이상)</label>
                            <input type="password" name="password" class="form-control" placeholder="비밀번호 입력" required style="background: white;">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">제목</label>
                        <input type="text" name="title" class="form-control" placeholder="제목을 입력하세요" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">내용</label>
                        <textarea name="content" class="form-control" placeholder="내용을 입력하세요" required></textarea>
                    </div>

                    <!-- 비밀글 옵션 (NOTICE가 아닐 때 제공) -->
                    <div class="form-group checkbox-group" th:if="${boardType != 'NOTICE'}">
                        <input type="checkbox" id="isSecret" name="isSecret" class="checkbox-control" value="true">
                        <label for="isSecret" class="form-label" style="margin-bottom: 0; cursor: pointer;">비밀글로 설정</label>
                    </div>

                    <!-- 첨부파일 업로드 -->
                    <div class="form-group">
                        <label class="form-label">첨부파일</label>
                        <div class="file-upload-box" onclick="document.getElementById('fileInput').click()">
                            <div class="file-upload-icon">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            </div>
                            <span class="file-upload-text">마우스 클릭 또는 파일을 드래그하여 업로드하세요. (다중 선택 가능)</span>
                            <input type="file" id="fileInput" name="files" style="display: none;" multiple onchange="updateFileList(this)">
                            <div id="selectedFileList" class="file-list"></div>
                        </div>
                    </div>

                    <div class="buttons-group">
                        <a th:href="@{/board/list(boardType=${boardType})}" class="btn-cancel">취소</a>
                        <button type="button" class="btn-submit" onclick="submitForm()">등록</button>
                    </div>
                </form>
            </div>
        </div>
        <div th:replace="~{fragments :: landingFooter}"></div>
    </th:block>

    <script th:inline="javascript">
        function updateFileList(input) {
            const listDiv = document.getElementById("selectedFileList");
            listDiv.innerHTML = "";
            if (input.files.length === 0) {
                return;
            }
            
            const titleSpan = document.createElement("span");
            titleSpan.style.fontWeight = "700";
            titleSpan.innerText = "선택된 파일 목록:";
            listDiv.appendChild(titleSpan);
            
            const ul = document.createElement("ul");
            ul.style.listStyleType = "none";
            ul.style.paddingLeft = "0";
            ul.style.marginTop = "6px";
            
            for (let i = 0; i < input.files.length; i++) {
                const li = document.createElement("li");
                li.style.display = "flex";
                li.style.alignItems = "center";
                li.style.gap = "6px";
                li.style.marginBottom = "4px";
                li.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg> ${input.files[i].name} (${(input.files[i].size / 1024).toFixed(1)} KB)`;
                ul.appendChild(li);
            }
            listDiv.appendChild(ul);
        }

        function submitForm() {
            const form = document.getElementById("articleForm");
            const formData = new FormData(form);

            // 비밀글 체크박스 값 보완
            const secretCheckbox = document.getElementById("isSecret");
            if (secretCheckbox) {
                formData.set("isSecret", secretCheckbox.checked ? "true" : "false");
            }

            fetch("/api/board/articles", {
                method: "POST",
                body: formData
            })
            .then(res => {
                if (res.ok) {
                    return res.json();
                } else {
                    return res.text().then(text => { throw new Error(text) });
                }
            })
            .then(data => {
                if (data.success) {
                    alert("글이 성공적으로 등록되었습니다.");
                    location.href = "/board/detail/" + data.articleId;
                } else {
                    alert("글 등록 실패: " + data.message);
                }
            })
            .catch(err => {
                console.error(err);
                alert("에러 발생: " + err.message);
            });
        }
    </script>
</body>
</html>
