server:
  port: 8090

spring:
  config:
    import: "optional:classpath:application-secret.yml"
  profiles:
    active: local
  sql:
    init:
      mode: always
  messages:
    fallback-to-system-locale: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: google-client-id-placeholder
            client-secret: google-client-secret-placeholder
            scope:
              - email
              - profile
          facebook:
            client-id: facebook-client-id-placeholder
            client-secret: facebook-client-secret-placeholder
            scope:
              - email
              - public_profile
          naver:
            client-id: naver-client-id-placeholder
            client-secret: naver-client-secret-placeholder
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            client-name: Naver
          kakao:
            client-id: kakao-client-id-placeholder
            client-secret: kakao-client-secret-placeholder
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-name: Kakao
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.pixellink.model
  configuration:
    map-underscore-to-camel-case: true
