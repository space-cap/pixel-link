<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${
        boardType == 'NOTICE' ? '공지사항 - Pixel-Link' :
        (boardType == 'FREE' ? '자유게시판 - Pixel-Link' :
        (boardType == 'QNA' ? '1:1 문의 - Pixel-Link' : '제휴제안 - Pixel-Link'))
    }">게시판 목록</title>
    <link rel="stylesheet" th:href="@{/css/global.css(v=2)}">
    <style>
        .board-container {
            width: 100%;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .board-card {
            background: var(--bg-card);
            border: 1px solid var(--card-border);
            box-shadow: var(--card-shadow);
            border-radius: var(--radius-lg);
            padding: 32px;
        }
        .board-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 20px;
        }
        .board-title h2 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .board-title p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .btn-write {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            color: white;
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition-normal);
            box-shadow: 0 4px 6px -1px rgba(29, 78, 216, 0.15);
        }
        .btn-write:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 12px -2px rgba(29, 78, 216, 0.25);
        }
        
        /* 테이블 스타일 */
        .board-table-container {
            overflow-x: auto;
            margin-bottom: 24px;
        }
        .board-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.95rem;
        }
        .board-table th {
            padding: 16px 20px;
            background: var(--bg-main);
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 2px solid var(--card-border);
            white-space: nowrap;
        }
        .board-table td {
            padding: 18px 20px;
            border-bottom: 1px solid var(--card-border);
            color: var(--text-main);
            white-space: nowrap;
        }
        .board-table tbody tr {
            transition: var(--transition-fast);
        }
        .board-table tbody tr:hover {
            background: var(--accent-light);
            cursor: pointer;
        }
        
        /* 뱃지 및 아이콘 스타일 */
        .secret-badge {
            display: inline-flex;
            align-items: center;
            color: #f59e0b;
            font-size: 0.85rem;
            font-weight: 600;
            gap: 4px;
            margin-left: 6px;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .status-open {
            background: #fef3c7;
            color: #d97706;
        }
        .status-resolved {
            background: #d1fae5;
            color: #059669;
        }
        .status-pending {
            background: #e0f2fe;
            color: #0284c7;
        }
        
        /* 검색창 */
        .search-form {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            justify-content: flex-end;
        }
        .search-input {
            padding: 8px 16px;
            border: 1px solid var(--card-border);
            border-radius: var(--radius-sm);
            width: 250px;
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition-fast);
        }
        .search-input:focus {
            border-color: var(--accent-primary);
        }
        .btn-search {
            background: var(--bg-main);
            border: 1px solid var(--card-border);
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition-fast);
        }
        .btn-search:hover {
            background: var(--card-border);
            color: var(--text-main);
        }
        
        /* 페이징 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 32px;
        }
        .pagination a, .pagination span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
            padding: 0 8px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--card-border);
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            transition: var(--transition-fast);
        }
        .pagination a:hover {
            background: var(--accent-light);
            color: var(--accent-primary);
            border-color: rgba(29, 78, 216, 0.2);
        }
        .pagination .active {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }
        
        /* 레이아웃 구조 */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }
        .dashboard-main {
            background: var(--bg-main);
            padding: 40px;
        }
    </style>
</head>
<body>

    <!-- [1] 로그인 회원 전용 레이아웃 -->
    <th:block th:if="${sessionUser != null}">
        <div th:replace="~{fragments :: dashboardHeader(currentUser=${sessionUser}, currentUserId=${sessionUser.id})}"></div>
        <div class="dashboard-container">
            <aside th:replace="~{fragments :: sidebar(activeMenu=${boardType == 'NOTICE' ? 'notice' : (boardType == 'FREE' ? 'free' : (boardType == 'QNA' ? 'qna' : 'partnership'))}, currentUserId=${sessionUser.id}, currentUser=${sessionUser})}"></aside>
            <div class="content-area">
                <div class="card" style="width: 100%;">
                    <!-- 헤더 및 타이틀 -->
                    <div class="board-header">
                        <div class="board-title">
                            <h2 th:text="${
                                boardType == 'NOTICE' ? '공지사항' :
                                (boardType == 'FREE' ? '자유게시판' :
                                (boardType == 'QNA' ? '1:1 문의' : '제휴제안'))
                            }">게시판</h2>
                            <p th:text="${
                                boardType == 'NOTICE' ? '서비스의 주요 공지사항을 확인하세요.' :
                                (boardType == 'FREE' ? '회원들과 자유롭게 의견을 나누는 공간입니다.' :
                                (boardType == 'QNA' ? '문의를 남겨주시면 관리자가 성심껏 답변드립니다.' : '제휴 제안을 등록하여 검토 결과를 확인하세요.'))
                            }">게시판 설명</p>
                        </div>
                        <!-- 글쓰기 권한: 공지사항은 어드민만, 나머지는 회원 모두 -->
                        <div th:if="${boardType != 'NOTICE' || sessionUser.role == 'ADMIN'}">
                            <a th:href="@{/board/create(boardType=${boardType})}" class="btn-write">글쓰기</a>
                        </div>
                    </div>

                    <!-- 검색 -->
                    <form th:action="@{/board/list}" method="get" class="search-form">
                        <input type="hidden" name="boardType" th:value="${boardType}">
                        <input type="text" name="searchKeyword" class="search-input" placeholder="검색어를 입력하세요" th:value="${searchKeyword}">
                        <button type="submit" class="btn-search">검색</button>
                    </form>

                    <!-- 목록 테이블 -->
                    <div class="board-table-container">
                        <table class="board-table">
                            <thead>
                                <tr>
                                    <th style="width: 80px;">번호</th>
                                    <th>제목</th>
                                    <th style="width: 150px;">작성자</th>
                                    <th style="width: 100px;" th:if="${boardType == 'QNA' || boardType == 'PARTNERSHIP'}">상태</th>
                                    <th style="width: 100px;">조회수</th>
                                    <th style="width: 180px;">등록일</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="article, loop : ${articles}" th:onclick="|location.href='@{/board/detail/{id}(id=${article.id})}'|">
                                    <td th:text="${(currentPage - 1) * 10 + loop.count}">1</td>
                                    <td>
                                        <span th:text="${article.title}">게시글 제목</span>
                                        <span th:if="${article.isSecret}" class="secret-badge">
                                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>🔒 비밀글
                                        </span>
                                    </td>
                                    <td th:text="${article.authorName}">작성자</td>
                                    <td th:if="${boardType == 'QNA' || boardType == 'PARTNERSHIP'}">
                                        <span th:if="${article.status == 'OPEN'}" class="status-badge status-open">접수됨</span>
                                        <span th:if="${article.status == 'RESOLVED'}" class="status-badge status-resolved">답변완료</span>
                                        <span th:if="${article.status == 'PENDING'}" class="status-badge status-pending">검토중</span>
                                    </td>
                                    <td th:text="${article.viewCount}">0</td>
                                    <td th:text="${#temporals.format(article.createdAt, 'yyyy-MM-dd HH:mm')}">2026-06-21</td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(articles)}">
                                    <td th:colspan="${boardType == 'QNA' || boardType == 'PARTNERSHIP' ? 6 : 5}" style="text-align: center; color: var(--text-muted); padding: 40px 0;">게시글이 존재하지 않습니다.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- 페이징 -->
                    <div class="pagination" th:if="${totalPages > 1}">
                        <a th:if="${currentPage > 1}" th:href="@{/board/list(boardType=${boardType}, searchKeyword=${searchKeyword}, page=${currentPage - 1})}">&laquo;</a>
                        
                        <th:block th:each="pageNum : ${#numbers.sequence(1, totalPages)}">
                            <span th:if="${pageNum == currentPage}" class="active" th:text="${pageNum}">1</span>
                            <a th:if="${pageNum != currentPage}" th:href="@{/board/list(boardType=${boardType}, searchKeyword=${searchKeyword}, page=${pageNum})}" th:text="${pageNum}">2</a>
                        </th:block>
                        
                        <a th:if="${currentPage < totalPages}" th:href="@{/board/list(boardType=${boardType}, searchKeyword=${searchKeyword}, page=${currentPage + 1})}">&raquo;</a>
                    </div>
                </div>
            </div>
        </div>
    </th:block>

    <!-- [2] 비회원 전용 레이아웃 -->
    <th:block th:if="${sessionUser == null}">
        <div th:replace="~{fragments :: landingHeader}"></div>
        <div class="board-container">
            <div class="board-card">
                <!-- 헤더 및 타이틀 -->
                <div class="board-header">
                    <div class="board-title">
                        <h2 th:text="${
                            boardType == 'NOTICE' ? '공지사항' :
                            (boardType == 'FREE' ? '자유게시판' :
                            (boardType == 'QNA' ? '1:1 문의' : '제휴제안'))
                        }">게시판</h2>
                        <p th:text="${
                            boardType == 'NOTICE' ? '서비스의 주요 공지사항을 확인하세요.' :
                            (boardType == 'FREE' ? '의견을 남겨주시면 정성껏 검토하겠습니다.' :
                            (boardType == 'QNA' ? '비회원도 문의글 작성이 가능하며 답변 확인 시 비밀번호가 요구됩니다.' : '제휴 제안을 자유롭게 등록해 주시기 바랍니다.'))
                        }">게시판 설명</p>
                    </div>
                    <!-- 비회원 글쓰기: 공지사항을 제외한 모든 게시판 허용 -->
                    <div th:if="${boardType != 'NOTICE'}">
                        <a th:href="@{/board/create(boardType=${boardType})}" class="btn-write">글쓰기</a>
                    </div>
                </div>

                <!-- 검색 -->
                <form th:action="@{/board/list}" method="get" class="search-form">
                    <input type="hidden" name="boardType" th:value="${boardType}">
                    <input type="text" name="searchKeyword" class="search-input" placeholder="검색어를 입력하세요" th:value="${searchKeyword}">
                    <button type="submit" class="btn-search">검색</button>
                </form>

                <!-- 목록 테이블 -->
                <div class="board-table-container">
                    <table class="board-table">
                        <thead>
                            <tr>
                                <th style="width: 80px;">번호</th>
                                <th>제목</th>
                                <th style="width: 150px;">작성자</th>
                                <th style="width: 100px;" th:if="${boardType == 'QNA' || boardType == 'PARTNERSHIP'}">상태</th>
                                <th style="width: 100px;">조회수</th>
                                <th style="width: 180px;">등록일</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="article, loop : ${articles}" th:onclick="|location.href='@{/board/detail/{id}(id=${article.id})}'|">
                                <td th:text="${(currentPage - 1) * 10 + loop.count}">1</td>
                                <td>
                                    <span th:text="${article.title}">게시글 제목</span>
                                    <span th:if="${article.isSecret}" class="secret-badge">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>🔒 비밀글
                                    </span>
                                </td>
                                <td th:text="${article.authorName}">작성자</td>
                                <td th:if="${boardType == 'QNA' || boardType == 'PARTNERSHIP'}">
                                    <span th:if="${article.status == 'OPEN'}" class="status-badge status-open">접수됨</span>
                                    <span th:if="${article.status == 'RESOLVED'}" class="status-badge status-resolved">답변완료</span>
                                    <span th:if="${article.status == 'PENDING'}" class="status-badge status-pending">검토중</span>
                                </td>
                                <td th:text="${article.viewCount}">0</td>
                                <td th:text="${#temporals.format(article.createdAt, 'yyyy-MM-dd HH:mm')}">2026-06-21</td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(articles)}">
                                <td th:colspan="${boardType == 'QNA' || boardType == 'PARTNERSHIP' ? 6 : 5}" style="text-align: center; color: var(--text-muted); padding: 40px 0;">게시글이 존재하지 않습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 페이징 -->
                <div class="pagination" th:if="${totalPages > 1}">
                    <a th:if="${currentPage > 1}" th:href="@{/board/list(boardType=${boardType}, searchKeyword=${searchKeyword}, page=${currentPage - 1})}">&laquo;</a>
                    
                    <th:block th:each="pageNum : ${#numbers.sequence(1, totalPages)}">
                        <span th:if="${pageNum == currentPage}" class="active" th:text="${pageNum}">1</span>
                        <a th:if="${pageNum != currentPage}" th:href="@{/board/list(boardType=${boardType}, searchKeyword=${searchKeyword}, page=${pageNum})}" th:text="${pageNum}">2</a>
                    </th:block>
                    
                    <a th:if="${currentPage < totalPages}" th:href="@{/board/list(boardType=${boardType}, searchKeyword=${searchKeyword}, page=${currentPage + 1})}">&raquo;</a>
                </div>
            </div>
        </div>
        <div th:replace="~{fragments :: landingFooter}"></div>
    </th:block>

</body>
</html>
