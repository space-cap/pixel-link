<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>

    <header th:fragment="dashboardHeader(currentUser, currentUserId)">
        <div class="logo-container">
            <span class="logo">Pixel-Link</span>
            <span class="logo-badge" th:text="#{dashboard.logo_badge}">Premium Linker</span>
        </div>
        
        <div class="user-selector">
            <!-- 언어 선택기 -->
            <span th:text="#{dashboard.lang_select}">Language:</span>
            <select class="select-user" onchange="switchLanguage(this.value)" style="margin-right: 15px;">
                <option value="en" th:selected="${#locale.language == 'en'}">English</option>
                <option value="ko" th:selected="${#locale.language == 'ko'}">한국어</option>
                <option value="ja" th:selected="${#locale.language == 'ja'}">日本語</option>
            </select>
        </div>
    </header>

    <!-- 2. 공통 사이드바 조각 -->
    <aside th:fragment="sidebar(activeMenu, currentUserId, currentUser)" class="sidebar">
        <!-- 2-1. 일반 사용자 메뉴 리스트 (어드민 모드가 아닐 때) -->
        <div class="sidebar-menu" th:if="${!#strings.startsWith(activeMenu, 'admin')}">
            <a th:href="@{/app/dashboard(userId=${currentUserId})}" 
               th:class="${activeMenu == 'dashboard'} ? 'menu-item active' : 'menu-item'">
                <span class="menu-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </span>
                <span th:text="#{menu.dashboard}">대시보드</span>
            </a>
            <a th:href="@{/app/create(userId=${currentUserId})}" 
               th:class="${activeMenu == 'create'} ? 'menu-item active' : 'menu-item'">
                <span class="menu-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
                </span>
                <span th:text="#{menu.advanced_create}">고급 링크 생성</span>
            </a>
            <a th:href="@{/app/links(userId=${currentUserId})}" 
               th:class="${activeMenu == 'links'} ? 'menu-item active' : 'menu-item'">
                <span class="menu-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                </span>
                <span th:text="#{menu.links}">링크 관리</span>
            </a>
            <a th:href="@{/app/monetization(userId=${currentUserId})}" 
               th:class="${activeMenu == 'monetization'} ? 'menu-item active' : 'menu-item'">
                <span class="menu-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                </span>
                <span th:text="#{menu.monetization}">수익 및 정산</span>
            </a>
            <a th:href="@{/app/developer(userId=${currentUserId})}" 
               th:class="${activeMenu == 'developer'} ? 'menu-item active' : 'menu-item'">
                <span class="menu-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 1.5 1.5M15.5 7.5 14 6"/></svg>
                </span>
                <span th:text="#{menu.developer}">개발자 센터</span>
            </a>
            <a th:href="@{/info/faq}" 
               th:class="${activeMenu == 'faq'} ? 'menu-item active' : 'menu-item'">
                <span class="menu-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                </span>
                <span th:text="#{menu.faq}">FAQ</span>
            </a>
            
            <!-- 공통 게시판 메뉴 -->
            <a th:href="@{/board/list?boardType=NOTICE}" 
               th:class="${boardType == 'NOTICE'} ? 'menu-item active' : 'menu-item'">
                <span class="menu-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
                </span>
                <span>공지사항</span>
            </a>
            <a th:href="@{/board/list?boardType=FREE}" 
               th:class="${boardType == 'FREE'} ? 'menu-item active' : 'menu-item'">
                <span class="menu-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </span>
                <span>자유게시판</span>
            </a>
            <a th:href="@{/board/list?boardType=QNA}" 
               th:class="${boardType == 'QNA'} ? 'menu-item active' : 'menu-item'">
                <span class="menu-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                </span>
                <span>1:1 문의</span>
            </a>
            <a th:href="@{/board/list?boardType=PARTNERSHIP}" 
               th:class="${boardType == 'PARTNERSHIP'} ? 'menu-item active' : 'menu-item'">
                <span class="menu-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                </span>
                <span>제휴제안</span>
            </a>

            <a th:href="@{/app/admin/dashboard(userId=${currentUserId})}" 
               th:if="${currentUser != null && currentUser.role == 'ADMIN'}"
               th:class="${activeMenu == 'admin'} ? 'menu-item active' : 'menu-item'">
                <span class="menu-icon" style="color: #f59e0b;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </span>
                <span style="color: #f59e0b;" th:text="#{menu.admin}">관리자 콘솔</span>
            </a>
        </div>


        <!-- 2-2. 관리자 전용 메뉴 리스트 (어드민 모드일 때) -->
        <div class="sidebar-menu" th:if="${#strings.startsWith(activeMenu, 'admin')}">
            <a th:href="@{/app/admin/dashboard(userId=${currentUserId})}" 
               th:class="${activeMenu == 'admin-dashboard'} ? 'menu-item active' : 'menu-item'">
                <span class="menu-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                </span>
                <span th:text="#{menu.admin_home}">어드민 홈</span>
            </a>
            <a th:href="@{/app/admin/users(userId=${currentUserId})}" 
               th:class="${activeMenu == 'admin-users'} ? 'menu-item active' : 'menu-item'">
                <span class="menu-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                </span>
                <span th:text="#{menu.admin_users}">회원 관리</span>
            </a>
            <a th:href="@{/app/admin/settlements(userId=${currentUserId})}" 
               th:class="${activeMenu == 'admin-settlements'} ? 'menu-item active' : 'menu-item'">
                <span class="menu-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </span>
                <span th:text="#{menu.admin_settlements}">정산/출금 승인</span>
            </a>
            <a th:href="@{/app/admin/settings(userId=${currentUserId})}" 
               th:class="${activeMenu == 'admin-settings'} ? 'menu-item active' : 'menu-item'">
                <span class="menu-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </span>
                <span th:text="#{menu.admin_settings}">시스템 설정</span>
            </a>
            <a th:href="@{/app/dashboard(userId=${currentUserId})}" class="menu-item" style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 15px;">
                <span class="menu-icon" style="color: #3b82f6;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </span>
                <span style="color: #3b82f6;" th:text="#{menu.admin_exit}">서비스로 돌아가기</span>
            </a>
        </div>

        <!-- 하단 로그인 회원 카드 (이모지 제거, 모노톤 SVG 아바타 대체) -->
        <div class="sidebar-user-card" th:if="${currentUser != null}">
            <div class="user-avatar" style="display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 50%; width: 28px; height: 28px;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div class="user-info-box" style="flex: 1; min-width: 0;">
                <div class="user-email" th:text="${currentUser.email}" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">user@pixel-link.com</div>
                <div class="user-tier-badge" th:text="${currentUser.subscriptionTier}">FREE</div>
            </div>
            <a th:href="@{/logout}" class="logout-link" title="로그아웃" style="margin-left: 10px; color: #ef4444; display: inline-flex; align-items: center; transition: color 0.2s ease;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </a>
        </div>
    </aside>

    <!-- 3. 비회원/랜딩용 공용 헤더 조각 -->
    <header th:fragment="landingHeader">
        <div class="logo-container">
            <a th:href="@{/}" style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
                <span class="logo">Pixel-Link</span>
                <span class="logo-badge" th:text="#{dashboard.logo_badge}">Premium Linker</span>
            </a>
        </div>
        
        <div class="header-action">
            <!-- 언어 선택기 -->
            <span th:text="#{dashboard.lang_select}">Language</span>
            <select class="select-user" onchange="switchLanguage(this.value)" style="margin-right: 15px;">
                <option value="en" th:selected="${#locale.language == 'en'}">English</option>
                <option value="ko" th:selected="${#locale.language == 'ko'}">한국어</option>
                <option value="ja" th:selected="${#locale.language == 'ja'}">日本語</option>
            </select>

            <!-- 비로그인 상태: 로그인, 회원가입 -->
            <th:block th:if="${session.user == null}">
                <a th:href="@{/app/login}" class="btn-login-header" th:text="#{landing.btn_login}">로그인</a>
                <a th:href="@{/app/signup}" class="btn-signup-header" th:text="#{landing.btn_signup}">회원가입</a>
            </th:block>
            <!-- 로그인 상태: 대시보드 보기, 로그아웃 -->
            <th:block th:if="${session.user != null}">
                <a th:href="@{/app/dashboard}" class="btn-signup-header" th:text="#{dashboard.title}">대시보드 보기</a>
                <a th:href="@{/logout}" class="btn-login-header" th:text="#{landing.btn_logout}">로그아웃</a>
            </th:block>
        </div>
    </header>

    <footer th:fragment="landingFooter" style="background: #0f172a; color: #475569; padding: 40px 20px; text-align: center; border-top: 1px solid #1e293b; font-size: 0.9rem;">
        <div style="margin-bottom: 15px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
            <a th:href="@{/board/list?boardType=NOTICE}" style="color: #64748b; text-decoration: none; font-weight: 600; transition: color 0.2s;" onmouseover="this.style.color='#94a3b8'" onmouseout="this.style.color='#64748b'">공지사항</a>
            <a th:href="@{/board/list?boardType=FREE}" style="color: #64748b; text-decoration: none; font-weight: 600; transition: color 0.2s;" onmouseover="this.style.color='#94a3b8'" onmouseout="this.style.color='#64748b'">자유게시판</a>
            <a th:href="@{/board/list?boardType=QNA}" style="color: #64748b; text-decoration: none; font-weight: 600; transition: color 0.2s;" onmouseover="this.style.color='#94a3b8'" onmouseout="this.style.color='#64748b'">1:1 문의</a>
            <a th:href="@{/board/list?boardType=PARTNERSHIP}" style="color: #64748b; text-decoration: none; font-weight: 600; transition: color 0.2s;" onmouseover="this.style.color='#94a3b8'" onmouseout="this.style.color='#64748b'">제휴제안</a>
            <a th:href="@{/info/faq}" style="color: #64748b; text-decoration: none; font-weight: 600; transition: color 0.2s;" onmouseover="this.style.color='#94a3b8'" onmouseout="this.style.color='#64748b'" th:text="#{menu.faq}">FAQ / 고객지원</a>
        </div>
        <p style="margin: 0; font-size: 0.85rem;">&copy; 2026 Pixel-Link. All rights reserved.</p>
    </footer>

</body>
</html>
