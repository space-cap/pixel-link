<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - Pixel-Link</title>
    <meta name="description" content="Privacy Policy for Pixel-Link service.">
    <link rel="stylesheet" th:href="@{/css/global.css(v=2)}">
    <style>
        .legal-outer-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .legal-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .legal-title {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        .legal-subtitle {
            font-size: 1rem;
            color: var(--text-muted);
        }
        .legal-content-card {
            background: white;
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            padding: 40px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            line-height: 1.7;
            color: var(--text-main);
        }
        .legal-section {
            margin-bottom: 30px;
        }
        .legal-section h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
            border-left: 4px solid #3b82f6;
            padding-left: 12px;
        }
        .legal-section p {
            margin-bottom: 10px;
            font-size: 0.95rem;
        }
        .legal-section ul {
            padding-left: 20px;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }
        .legal-section li {
            margin-bottom: 6px;
        }
    </style>
</head>
<body>

    <!-- 1. 로그인 상태 레이아웃 -->
    <div th:if="${currentUser != null}">
        <div th:replace="~{fragments :: dashboardHeader(currentUser=${currentUser}, currentUserId=${currentUserId})}"></div>
        <div class="dashboard-container">
            <div th:replace="~{fragments :: sidebar(activeMenu='', currentUserId=${currentUserId}, currentUser=${currentUser})}"></div>
            <div class="content-area">
                <div class="content-wide">
                    <div class="legal-outer-container">
                        <div class="legal-header">
                            <h1 class="legal-title" th:text="${#locale.language == 'ko' ? '개인정보처리방침' : 'Privacy Policy'}">Privacy Policy</h1>
                            <p class="legal-subtitle" th:text="${#locale.language == 'ko' ? 'Pixel-Link 서비스 이용을 위한 개인정보 처리 안내' : 'Information about how we process your personal data.'}">Privacy Guidelines</p>
                        </div>
                        <div class="legal-content-card">
                            <div th:replace="~{legal-fragments :: privacyContent}"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. 비로그인 상태 레이아웃 -->
    <div th:if="${currentUser == null}">
        <header th:replace="~{fragments :: landingHeader}"></header>
        <div class="legal-outer-container">
            <div class="legal-header">
                <h1 class="legal-title" th:text="${#locale.language == 'ko' ? '개인정보처리방침' : 'Privacy Policy'}">Privacy Policy</h1>
                <p class="legal-subtitle" th:text="${#locale.language == 'ko' ? 'Pixel-Link 서비스 이용을 위한 개인정보 처리 안내' : 'Information about how we process your personal data.'}">Privacy Guidelines</p>
            </div>
            <div class="legal-content-card">
                <div th:replace="~{legal-fragments :: privacyContent}"></div>
            </div>
            <div style="margin-top: 50px; text-align: center;">
                <a th:href="@{/}" class="btn-secondary" style="display: inline-block; width: auto; padding: 12px 30px; border-radius: 8px;" th:text="${#locale.language == 'ko' ? '홈페이지로 돌아가기' : 'Back to Home'}">홈페이지로 돌아가기</a>
            </div>
        </div>
        <footer th:replace="~{fragments :: landingFooter}"></footer>
    </div>



</body>
</html>
