<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${link.title != null && !#strings.isEmpty(link.title) ? link.title : '연결 중...'}">연결 중...</title>
    <meta name="description" th:content="${link.description != null ? link.description : ''}">
    
    <!-- OpenGraph SEO 메타 태그 (SNS 미리보기 최적화) -->
    <meta property="og:title" th:content="${link.title != null && !#strings.isEmpty(link.title) ? link.title : 'Pixel-Link'}">
    <meta property="og:description" th:content="${link.description != null ? link.description : '안전하게 이동 중입니다.'}">
    <meta property="og:image" th:content="${link.ogImage != null && !#strings.isEmpty(link.ogImage) ? link.ogImage : ''}">
    <meta property="og:type" content="website">

    <!-- 1. Facebook Pixel Code 삽입 (Starter 이상 요금제 전용) -->
    <script th:if="${link.fbPixelId != null && !#strings.isEmpty(link.fbPixelId)}" th:inline="javascript">
        /*<![CDATA[*/
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', /*[[${link.fbPixelId}]]*/ '');
        fbq('track', 'PageView');
        /*]]>*/
    </script>
    
    <!-- 2. Google Analytics Tag (gtag.js) 삽입 (Starter 이상 요금제 전용) -->
    <script th:if="${link.gaTrackingId != null && !#strings.isEmpty(link.gaTrackingId)}" th:src="@{'https://www.googletagmanager.com/gtag/js?id=' + ${link.gaTrackingId}}" async></script>
    <script th:if="${link.gaTrackingId != null && !#strings.isEmpty(link.gaTrackingId)}" th:inline="javascript">
        /*<![CDATA[*/
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', /*[[${link.gaTrackingId}]]*/ '');
        /*]]>*/
    </script>

    <!-- 3. Custom Script 삽입 (Premium 요금제 전용) -->
    <script th:if="${link.customScript != null && !#strings.isEmpty(link.customScript)}" th:utext="${link.customScript}"></script>

    <style>
        body {
            background-color: #f8fafc;
            color: #0f172a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #eff6ff 0%, #f8fafc 100%);
        }
        .container {
            text-align: center;
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(29, 78, 216, 0.08);
            border-radius: 50%;
            border-top-color: #1d4ed8;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px auto;
            box-shadow: 0 0 15px rgba(29, 78, 216, 0.1);
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #475569;
            letter-spacing: -0.025em;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 일반 리다이렉션 화면 -->
        <div th:if="${!link.adEnabled}">
            <div class="spinner"></div>
            <h1 th:text="#{redirect.loading}">안전한 목적지로 연결 중입니다...</h1>
        </div>

        <!-- 3단계: 광고 노출 및 타이머 대기 화면 -->
        <div th:if="${link.adEnabled}" style="max-width: 600px; margin: 0 auto; padding: 20px;">
            <div class="spinner" id="adSpinner"></div>
            <h1 id="timerInfo" style="margin-bottom: 20px; font-size: 1.2rem; color: #1e293b;">
                <span id="countdownSeconds" th:text="${link.adTimerSeconds}">5</span>초 후 목적지로 연결됩니다...
            </h1>
            
            <!-- 가상 구글 애드센스 마케팅 배너 -->
            <div onclick="handleAdClick()" style="background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); border-radius: 16px; padding: 30px; color: white; cursor: pointer; text-align: center; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.2); transition: transform 0.2s; position: relative; overflow: hidden; margin-top: 30px;">
                <span style="position: absolute; top: 10px; right: 15px; font-size: 0.7rem; background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 10px;">Sponsored AD</span>
                <div style="font-size: 1.8rem; margin-bottom: 10px;">🎯</div>
                <h3 style="margin: 0 0 8px 0; font-size: 1.3rem; font-weight: 800;">Pixel-Link 프리미엄 멤버십</h3>
                <p style="margin: 0; font-size: 0.9rem; opacity: 0.9;">지금 가입하시면 무제한 링크 및 마케팅 픽셀 연동이 평생 무료!</p>
                <div style="margin-top: 15px; display: inline-block; background: white; color: #1d4ed8; font-weight: bold; padding: 8px 18px; border-radius: 20px; font-size: 0.85rem;">자세히 보기 ➔</div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        let targetUrl = /*[[${link.defaultTargetUrl}]]*/ 'https://example.com';
        const isAdEnabled = /*[[${link.adEnabled}]]*/ false;
        let adSeconds = /*[[${link.adTimerSeconds != null ? link.adTimerSeconds : 5}]]*/ 5;
        const linkId = /*[[${link.id}]]*/ '';
        
        // 상대경로 오독 방지용 스키마 자동 보정
        if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://') && !targetUrl.includes('://')) {
            targetUrl = 'https://' + targetUrl;
        }

        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        const hasAppSchema = targetUrl.includes('://') && !targetUrl.startsWith('http://') && !targetUrl.startsWith('https://');

        // 광고 클릭 핸들러
        function handleAdClick() {
            // 새창으로 모의 광고 랜딩 페이지 연결
            window.open('/?ref=ad-click', '_blank');
            
            // 광고 클릭 통계 수집 API 전송 (3단계 핵심 아키텍처)
            fetch(`/api/links/${linkId}/ad-click`, {
                method: 'POST'
            })
            .then(res => res.json())
            .then(json => {
                console.log('Ad click recorded:', json);
            })
            .catch(err => console.error(err));
        }

        function executeRedirect() {
            document.body.style.transition = 'opacity 0.3s ease';
            document.body.style.opacity = '0';
            setTimeout(() => {
                if (isMobile && hasAppSchema) {
                    // 모바일 앱 인텐트 실행
                    window.location.href = targetUrl;
                    setTimeout(() => {
                        // 앱 미설치 시 가상 마켓 폴백
                        if (!targetUrl.startsWith('intent://')) {
                            window.location.replace('https://play.google.com/store'); // 모의 대체 마켓
                        }
                    }, 2000);
                } else {
                    window.location.replace(targetUrl);
                }
            }, 300);
        }

        if (isAdEnabled) {
            // 타이머 카운트다운 가동
            const countdownEl = document.getElementById('countdownSeconds');
            const timer = setInterval(() => {
                adSeconds--;
                if (countdownEl) {
                    countdownEl.innerText = adSeconds;
                }
                if (adSeconds <= 0) {
                    clearInterval(timer);
                    executeRedirect();
                }
            }, 1000);
        } else {
            // 일반 연결은 1초 대기 후 즉시 이동
            setTimeout(executeRedirect, 1000);
        }
        /*]]>*/
    </script>
</body>
</html>
