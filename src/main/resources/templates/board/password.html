<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 확인 - Pixel-Link</title>
    <link rel="stylesheet" th:href="@{/css/global.css(v=2)}">
    <style>
        .pwd-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .pwd-card {
            background: var(--bg-card);
            border: 1px solid var(--card-border);
            box-shadow: var(--card-shadow);
            border-radius: var(--radius-lg);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .pwd-icon {
            color: #f59e0b;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #fef3c7;
            padding: 16px;
            border-radius: 50%;
        }
        .pwd-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 12px;
        }
        .pwd-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .error-message {
            background: #fef2f2;
            border: 1px solid #fee2e2;
            color: #ef4444;
            padding: 10px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .pwd-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: var(--transition-fast);
            margin-bottom: 20px;
            letter-spacing: 0.3em;
        }
        .pwd-input:focus {
            border-color: var(--accent-primary);
        }
        .pwd-buttons {
            display: flex;
            gap: 12px;
        }
        .pwd-btn {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-fast);
        }
        .pwd-btn-submit {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            color: white;
            border: none;
        }
        .pwd-btn-submit:hover {
            opacity: 0.9;
        }
        .pwd-btn-cancel {
            background: var(--bg-main);
            border: 1px solid var(--card-border);
            color: var(--text-muted);
        }
        .pwd-btn-cancel:hover {
            background: var(--card-border);
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div th:replace="~{fragments :: landingHeader}"></div>

    <div class="pwd-container">
        <div class="pwd-card">
            <div class="pwd-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <div class="pwd-title">비밀글 비밀번호 확인</div>
            <div class="pwd-desc">
                이 게시글은 비밀글로 설정되어 있습니다.<br>
                작성 시 설정한 비회원 비밀번호를 입력해주십시오.
            </div>

            <!-- 에러 메시지 노출 -->
            <div th:if="${error}" class="error-message" th:text="${error}">
                비밀번호가 일치하지 않습니다.
            </div>

            <form th:action="@{/board/password/{id}(id=${articleId})}" method="post">
                <input type="password" name="password" class="pwd-input" placeholder="••••" required autofocus autocomplete="off">
                <div class="pwd-buttons">
                    <a th:href="@{/board/list(boardType=${boardType})}" class="pwd-btn pwd-btn-cancel">이전으로</a>
                    <button type="submit" class="pwd-btn pwd-btn-submit">확인</button>
                </div>
            </form>
        </div>
    </div>

    <div th:replace="~{fragments :: landingFooter}"></div>

</body>
</html>
