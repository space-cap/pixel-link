<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${link.title != null && !#strings.isEmpty(link.title) ? link.title : '콘텐츠 잠금'}">Premium Content Locked</title>
    <!-- global.css 스타일 연동 -->
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <style>
        body {
            background: radial-gradient(circle at center, #eff6ff 0%, #f8fafc 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .paywall-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 24px;
            padding: 40px;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05);
            text-align: center;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lock-icon {
            font-size: 3.2rem;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .content-title {
            font-size: 1.35rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .content-desc {
            font-size: 0.92rem;
            color: #64748b;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .price-badge {
            background: rgba(37, 99, 235, 0.08);
            border: 1px solid rgba(37, 99, 235, 0.2);
            color: #2563eb;
            font-size: 1.8rem;
            font-weight: 800;
            padding: 12px 24px;
            border-radius: 16px;
            display: inline-block;
            margin-bottom: 30px;
        }

        .pg-select-box {
            text-align: left;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 25px;
        }

        .pg-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            font-size: 0.9rem;
            color: #334155;
            font-weight: 600;
        }

        .pg-option:last-child {
            border-bottom: none;
        }

        .pg-option input {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>

    <div class="paywall-card">
        <div class="lock-icon">🔒</div>
        <h2 class="content-title" th:text="${link.title != null && !#strings.isEmpty(link.title) ? link.title : '프리미엄 콘텐츠'}">Premium Content Locked</h2>
        <p class="content-desc" th:text="${link.description != null && !#strings.isEmpty(link.description) ? link.description : '이 콘텐츠는 판매자가 지정한 요금을 결제한 후 바로 접근하실 수 있습니다.'}">
            이 콘텐츠는 판매자가 지정한 요금을 결제한 후 바로 접근하실 수 있습니다.
        </p>

        <!-- 결제 금액 -->
        <div class="price-badge" th:text="${#numbers.formatInteger(link.price, 0, 'COMMA')} + ' 원'">
            1,000 원
        </div>

        <!-- 모의 결제 위젯 -->
        <div class="pg-select-box">
            <div style="font-size: 0.8rem; font-weight: 800; color: #94a3b8; margin-bottom: 10px; text-transform: uppercase;">Payment Method</div>
            <label class="pg-option">
                <input type="radio" name="paymentMethod" value="card" checked>
                <span>💳 신용/체크카드 (모의 결제)</span>
            </label>
            <label class="pg-option">
                <input type="radio" name="paymentMethod" value="toss">
                <span>🔵 토스페이 (모의 결제)</span>
            </label>
            <label class="pg-option">
                <input type="radio" name="paymentMethod" value="kakao">
                <span>💛 카카오페이 (모의 결제)</span>
            </label>
        </div>

        <!-- 결제하기 버튼 -->
        <button onclick="processMockPayment()" id="payBtn" class="btn" style="width: 100%; padding: 15px; font-weight: 700; font-size: 1.05rem; background: #2563eb; color: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2);">
            결제하고 즉시 열기
        </button>
        
        <p style="margin-top: 15px; margin-bottom: 0; font-size: 0.75rem; color: #94a3b8;">
            * 본 결제는 가상 결제창이며, 실제 요금이 청구되지 않습니다.
        </p>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const linkId = /*[[${link.id}]]*/ '';
        const price = /*[[${link.price}]]*/ 0;

        function processMockPayment() {
            const payBtn = document.getElementById('payBtn');
            payBtn.innerText = '결제 승인 중...';
            payBtn.disabled = true;
            payBtn.style.opacity = '0.6';

            // 모의 결제 승인 API 호출 (5% 플랫폼 수수료 및 95% 소유자 정산금 적재)
            fetch(`/api/links/${linkId}/payments/confirm?amount=${price}`, {
                method: 'POST'
            })
            .then(res => res.json())
            .then(json => {
                if (json.success) {
                    payBtn.innerText = '결제 성공! 잠금 해제 중...';
                    payBtn.style.background = '#10b981';
                    
                    // 1초 뒤 페이지를 새로고침하여 리다이렉트 활성화
                    setTimeout(() => {
                        window.location.reload();
                    }, 1000);
                } else {
                    alert(json.error.message || '결제 처리에 실패했습니다.');
                    resetPayButton();
                }
            })
            .catch(err => {
                console.error(err);
                alert('서버 통신 중 오류가 발생했습니다.');
                resetPayButton();
            });
        }

        function resetPayButton() {
            const payBtn = document.getElementById('payBtn');
            payBtn.innerText = '결제하고 즉시 열기';
            payBtn.disabled = false;
            payBtn.style.opacity = '1';
            payBtn.style.background = '#2563eb';
        }
        /*]]>*/
    </script>
</body>
</html>
